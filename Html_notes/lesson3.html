<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 3 - Registration Form</title>
    <link rel="stylesheet" href="../HTML_CSS/lesson3.css">
</head>
<body>
    <h1>Student Registration Form</h1>
    <p>Please fill in your basic details.</p>
    <p>This project will help you learn HTML step by step.</p>

    <form>
        <!-- 1. label gives a name to an input field. -->
        <label for="name">Name:</label>
        <input id="name" type="text" placeholder="Enter your name"><br>

        <!-- 2. placeholder shows hint text inside an input. -->
        <label for="email">Email:</label>
        <input id="email" type="email" placeholder="Enter your email"><br>
    </form>
</body>
</html>
