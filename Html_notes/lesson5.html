<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 5 - Registration Form</title>
    <link rel="stylesheet" href="../HTML_CSS/lesson5.css">
</head>
<body>
    <!-- 1. header is the top part of the page. -->
    <header>
        <h1>Student Registration Form</h1>
        <p>Please fill in your basic details.</p>
    </header>

    <!-- 2. main is the main content of the page. -->
    <main>
        <!-- 3. section groups related content. -->
        <section>
            <h2>Personal Details</h2>
            <form>
                <label for="name">Name:</label>
                <input id="name" type="text" placeholder="Enter your name"><br>

                <label for="email">Email:</label>
                <input id="email" type="email" placeholder="Enter your email"><br>

                <label for="password">Password:</label>
                <input id="password" type="password" placeholder="Enter your password"><br>

                Gender:
                <input id="male" type="radio" name="gender">
                <label for="male">Male</label>
                <input id="female" type="radio" name="gender">
                <label for="female">Female</label><br>

                <!-- 4. checkbox lets the user select many options. -->
                Subjects:
                <input id="html" type="checkbox">
                <label for="html">HTML</label>
                <input id="css" type="checkbox">
                <label for="css">CSS</label><br>
            </form>
        </section>
    </main>

    <!-- 5. footer is the bottom part of the page. -->
    <footer>
        <p>Practice lesson 5</p>
    </footer>
</body>
</html>
