<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoeticsTech</title>
    <link rel = "stylesheet" href = "../css_notes/style.css">
</head>
<body>
    <header>
        <h1> NoeticsTech</h1>
        <img src = "world.png" height = "200 " altername = "world">
        <p> The Company For Future</p>

    </header>

    <main>   
        <Section>
            <h2> About Company </h2>
            <p> Read the Below content </p>
        </Section>
        <section>
            <table border ="1">
                <caption> Salary in roles </caption>
                <thead>
                    <tr>
                        <th> Roles</th>
                        <th> salary</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>designer</td>
                        <td>200k</td>
                    </tr>
                    <tr>
                        <td>Writer</td>
                        <td>300k</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section>
            <H2> Registration to join the team</H2>

            <form>
                <h3> Tell me about Yourself</h3>
                <label for = "x"> Name : </label>
                <input id = "x" type = "text" placeholder = "Right only first name"><br>
                 Gender :
                <label for = "y"> Male </label>
                <input id = "y" type = "radio" name = "t">
                <label for = "z"> Female</label>
                <input id = "z" type = "radio" name = "t"><br>

                <label for = "role">Role :</label>
                <select id = "role">
                    <option> Designer</option>
                    <option> Story writer</option>
                    <option> 3d designer</option>
                </select><br>

                <label for = "message"> What you want to grow here :</label>
                <textarea id = "message" rows = "4" cols = "30" Placeholder = "Write Your message here"></textarea><br>

                <input type = "button" value = "submit">

            </form>
        </section>

    </main>

    <footer>  

    </footer>
</body>
</html>
