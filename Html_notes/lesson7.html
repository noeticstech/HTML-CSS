<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 7 - Registration Form</title>
    <link rel="stylesheet" href="../HTML_CSS/lesson7.css">
</head>
<body>
    <header id="top-header">
        <div class="page-title">
            <h1>Student Registration Form</h1>
            <p>Please fill in your basic details.</p>
        </div>
    </header>

    <main>
        <section>
            <h2>Personal Details</h2>
            <form>
                <label for="name">Name:</label>
                <input id="name" type="text" placeholder="Enter your name"><br>

                <label for="email">Email:</label>
                <input id="email" type="email" placeholder="Enter your email"><br>

                <label for="password">Password:</label>
                <input id="password" type="password" placeholder="Enter your password"><br>

                Gender:
                <input id="male" type="radio" name="gender">
                <label for="male">Male</label>
                <input id="female" type="radio" name="gender">
                <label for="female">Female</label><br>

                Subjects:
                <input id="html" type="checkbox">
                <label for="html">HTML</label>
                <input id="css" type="checkbox">
                <label for="css">CSS</label><br>

                <label for="city">City:</label>
                <select id="city">
                    <option>Delhi</option>
                    <option>Mumbai</option>
                    <option>Bangalore</option>
                </select><br>

                <label for="about">About You:</label>
                <textarea id="about" rows="4" cols="30" placeholder="Write about yourself"></textarea><br>

                <!-- 1. submit creates a form button. -->
                <input type="submit" value="Register">
            </form>
        </section>

        <!-- 2. table shows structured data in rows and columns. -->
        <section>
            <h2>Fee Structure</h2>
            <table border="1">
                <caption>Course Fees</caption>
                <thead>
                    <tr>
                        <th>Course</th>
                        <th>Fee</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>HTML</td>
                        <td>1000</td>
                    </tr>
                    <tr>
                        <td>CSS</td>
                        <td>1200</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>Practice lesson 7</p>
    </footer>
</body>
</html>
