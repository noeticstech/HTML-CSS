<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Registration</title>
</head>
<body>
    <h1> This is a registration Form to enter the team of VRMMORPG</h1>
    <p> VRMMORPG is a game develop by NoeticsTech technology </p>
    <h2> To enter the team you have to fill the below form </h2>

    <section>
        <table border="1">
            <caption>Salary in Roles</caption>
            <thead>
                <tr>
                    <th>Role</th>
                    <th>Salary</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Designer</td>
                    <td>200k</td>
                </tr>
                <tr>
                    <td>Story Teller</td>
                    <td>700k</td>
                </tr>
            </tbody>
        </table>
    </section>


    <section>
        <div class = " introduction ">
            <h2> Tell me about You</h2>
        </div>
        <form>
                        
            <label for = "a">Name : </label>
            <input id = "a" type = "text" placeholder = "Only first name "><br>

            <label for = "b"> Email : </label>
            <input id = "b" type = "email" placeholder = "microssoft email is valid only"><br>

            <label for = "c"> Message : </label>
            <input id = "c" type = "text" placeholder = "Reason to be slave"><br>

            Role : 
            <label for = "d"> Designer : </label>
            <input id = "d" type = "radio" name = "x">

            <label for = "e"> Story writer : </label>
            <input id = "e" type = "radio" name = "x">
        </form>
    </section>

    
</body>
</html>
