<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM9 - value</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f8fafc;
      }

      .box {
        max-width: 720px;
        background: #ffffff;
        padding: 24px;
        border: 1px solid #dbe3ef;
        border-radius: 12px;
      }

      input {
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
      }

      button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        background: #0f4c81;
        color: #ffffff;
        cursor: pointer;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <p><a href="./index.html">Back to DOM Notes</a></p>
      <h1>DOM9: value</h1>
      <p>This example reads the value typed inside an input box.</p>

      <input id="name-input" type="text" placeholder="Enter your name" />
      <button id="show-btn">Show value</button>
      <p id="output">Your input will appear here.</p>
    </div>

    <script src="./DOM9.js"></script>
  </body>
</html>
