<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM5 - style</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f8fafc;

      .box {

        margin-top: 16px;

  <body>
    <div class="box">
      <p><a href="./index.html">Back to DOM Notes</a></p>
      <h1>DOM5: style</h1>
      <p>This example changes inline CSS using JavaScript.</p>

      <div id="style-box">This box is styled by JavaScript.</div>
    </div>

    <script src="./DOM5.js"></script>
  </body>
</html>
